<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="icon" href="./google-favicon.png">

    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header>
        <div class="header-links">
            <a href="#">Gmail</a>
            <a href="#">Images</a>
            <span><i class="fa-solid fa-bars"></i></span>
            <!-- <div class="profile-wrapper"> -->
                <span class="profile">H</span>
            <!-- </div> -->
        </div>
    </header>

    <main>

        <div class="centered-content">

            <img src="./google-logo.png" alt="Google Logo" width="300px">
            
            <div class="search-bar">
                <button class="plus"><i class="fa-solid fa-plus"></i></button>
                <input class="search-input" type="text">
                
                <div class="search-bar-right">
                    <button class="mic"><i class="fa-solid fa-microphone"></i></button>
                    <button class="lens"><i class="fa-regular fa-camera"></i></button>
                    <button class="ai">
                        <i class="fa-solid fa-magnifying-glass-plus"></i>
                        AI Mode
                    </button>
                </div>
            </div>
            
            <div class="buttons-wrapper">
                <button>Google Searh</button>
                <button>I'm Feeling Lucky</button>
            </div>
            
            <p class="language">
                Google offered in
                <a href="#">پشتو</a>
                <a href="#">فارسی</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="footer-top">
            <p>Afghanistan</p>
        </div>

        <div  class="footer-bottom">
            <div>
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Businnes</a>
                <a href="#">How Search works</a>
            </div>

            <div>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>
</body>

</html>
