<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-left">
            <img src="./assets/images/icon-menu.svg" alt="Menu icon">
            <span id="business-logo">sneaker</span>
        </div>

        <div class="header-right">
            <img src="./assets/images/icon-cart.svg" alt="Cart icon" class="icon">
            <img src="./assets/images/image-avatar.png" alt="Cart icon" class="profile">
        </div>
    </header>


    <main>
        <div class="product-wrapper">
            <img src="./assets/images/image-product-1.jpg" alt="Product image" class="product-img">

            <div class="button-wrapper">
                <button>
                    <img src="./assets/images/icon-previous.svg" alt="" class="icon">
                </button>
                <button>
                    <img src="./assets/images/icon-next.svg" alt="" class="icon">
                </button>
            </div>
        </div>

        <div class="product-detail">
            <p class="company">sneaker company</p>
            <h1 class="product-title">Fall Limited Edition Sneakers</h1>
            <!-- <p class="product-description">
                Lorem ipsum dolor sit amet consectetur, adipisicing elit. Incidunt hic molestias vitae nihil est eum
                modi! Velit dolorem in facere repellendus nostrum, at commodi sequi eaque iure eius neque reprehenderit?
            </p> -->

            <div class="product-prices">
                <p class="price">$125.00</p>
                <p class="discount">50%</p>
                <p class="off">$250.00</p>
            </div>



            <div class="counter-buttons">
                <button>
                    <img src="./assets/images/icon-minus.svg" alt="Minus Icon" class="icon">
                </button>
                <span class="quantity">0</span>
                <button>
                    <img src="./assets/images/icon-plus.svg" alt="Plus Icon" class="icon">
                </button>
            </div>

            <button class="add-to-cart">
                <img src="./assets/images/icon-cart.svg" alt="Cart Icon" class="icon">
                <span>Add to cart</span>
            </button>

        </div>
    </main>
</body>

</html>
